# LedgerRAG self-host stack — `docker compose up -d --build`
#
# Model serving (Ollama / vLLM / llama.cpp) is deliberately NOT part of this
# stack (constraint C3): the deploying engineer runs it wherever the GPUs are
# and points the LEDGERRAG_MODELS__* variables at it. Defaults assume Ollama
# on the docker host. For AMD RDNA4 hosts see SPEC Appendix A.3 (OLLAMA_VULKAN=1,
# pin the Ollama version).

x-backend-env: &backend-env
  LEDGERRAG_DATABASE_URL: postgresql+psycopg://ledgerrag:ledgerrag@postgres:5432/ledgerrag
  LEDGERRAG_REDIS_URL: redis://redis:6379/0
  LEDGERRAG_QDRANT_URL: http://qdrant:6333
  LEDGERRAG_OBJECT_STORE__BACKEND: minio
  LEDGERRAG_OBJECT_STORE__ENDPOINT: minio:9000
  LEDGERRAG_OBJECT_STORE__ACCESS_KEY: ledgerrag
  LEDGERRAG_OBJECT_STORE__SECRET_KEY: ledgerrag-secret
  LEDGERRAG_OBJECT_STORE__BUCKET: ledgerrag
  LEDGERRAG_OBJECT_STORE__SECURE: "false"
  LEDGERRAG_MODELS__PARSER__PROVIDER: ${LEDGERRAG_MODELS__PARSER__PROVIDER:-ollama}
  LEDGERRAG_MODELS__PARSER__BASE_URL: ${LEDGERRAG_MODELS__PARSER__BASE_URL:-http://host.docker.internal:11434}
  LEDGERRAG_MODELS__PARSER__MODEL_NAME: ${LEDGERRAG_MODELS__PARSER__MODEL_NAME:-qwen3-vl:8b-instruct}
  LEDGERRAG_MODELS__EMBEDDER__PROVIDER: ${LEDGERRAG_MODELS__EMBEDDER__PROVIDER:-ollama}
  LEDGERRAG_MODELS__EMBEDDER__BASE_URL: ${LEDGERRAG_MODELS__EMBEDDER__BASE_URL:-http://host.docker.internal:11434}
  LEDGERRAG_MODELS__EMBEDDER__MODEL_NAME: ${LEDGERRAG_MODELS__EMBEDDER__MODEL_NAME:-bge-m3}
  LEDGERRAG_EMBEDDING_DIM: ${LEDGERRAG_EMBEDDING_DIM:-1024}
  LEDGERRAG_MODELS__CHAT__PROVIDER: ${LEDGERRAG_MODELS__CHAT__PROVIDER:-ollama}
  LEDGERRAG_MODELS__CHAT__BASE_URL: ${LEDGERRAG_MODELS__CHAT__BASE_URL:-http://host.docker.internal:11434}
  LEDGERRAG_MODELS__CHAT__MODEL_NAME: ${LEDGERRAG_MODELS__CHAT__MODEL_NAME:-mistral:latest}
  LEDGERRAG_MODELS__RERANKER__PROVIDER: ${LEDGERRAG_MODELS__RERANKER__PROVIDER:-disabled}
  LEDGERRAG_MODELS__RERANKER__BASE_URL: ${LEDGERRAG_MODELS__RERANKER__BASE_URL:-}
  LEDGERRAG_MODELS__RERANKER__MODEL_NAME: ${LEDGERRAG_MODELS__RERANKER__MODEL_NAME:-}
  LEDGERRAG_VERIFICATION_ENABLED: ${LEDGERRAG_VERIFICATION_ENABLED:-true}
  LEDGERRAG_CHAT_NUM_CTX: ${LEDGERRAG_CHAT_NUM_CTX:-16384}
  LEDGERRAG_CHAT_TEMPERATURE: ${LEDGERRAG_CHAT_TEMPERATURE:-0.0}
  # image quality knobs (e.g. LEDGERRAG_TABLE_CROP_DPI=300 to test denser grids)
  LEDGERRAG_TABLE_CROP_DPI: ${LEDGERRAG_TABLE_CROP_DPI:-240}
  LEDGERRAG_VLM_MIN_IMAGE_WIDTH: ${LEDGERRAG_VLM_MIN_IMAGE_WIDTH:-1400}
  # Phase 3 confidence layer
  LEDGERRAG_DOUBLE_READ_ENABLED: ${LEDGERRAG_DOUBLE_READ_ENABLED:-true}
  LEDGERRAG_CONFIDENCE_REVIEW_THRESHOLD: ${LEDGERRAG_CONFIDENCE_REVIEW_THRESHOLD:-0.9}
  LEDGERRAG_DOUBLE_READ_AGREEMENT_THRESHOLD: ${LEDGERRAG_DOUBLE_READ_AGREEMENT_THRESHOLD:-0.98}
  # cross-model double-read (Phase 3): set to a DIFFERENT model on the parser's
  # server to catch systematic same-model errors, e.g. minicpm-v:latest.
  # Empty = same-model seed-shift (catches only random divergence).
  LEDGERRAG_DOUBLE_READ_MODEL_NAME: ${LEDGERRAG_DOUBLE_READ_MODEL_NAME:-}
  LEDGERRAG_DOUBLE_READ_BASE_URL: ${LEDGERRAG_DOUBLE_READ_BASE_URL:-}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledgerrag
      POSTGRES_PASSWORD: ledgerrag
      POSTGRES_DB: ledgerrag
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerrag"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ledgerrag
      MINIO_ROOT_PASSWORD: ledgerrag-secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment: *backend-env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      qdrant: { condition: service_started }

  worker:
    build: .
    command: celery -A tablerag.ingestion.worker worker --loglevel=info --concurrency=2
    environment: *backend-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      qdrant: { condition: service_started }

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Optional cross-encoder reranker (Phase 4 `reranker` role). Opt-in — it does
  # not start with a plain `docker compose up`; bring it up explicitly:
  #     docker compose --profile reranker up -d reranker
  # then point the role at it (compose-network name, TEI listens on :80):
  #     LEDGERRAG_MODELS__RERANKER__PROVIDER=openai_compat
  #     LEDGERRAG_MODELS__RERANKER__BASE_URL=http://reranker:80
  #     LEDGERRAG_MODELS__RERANKER__MODEL_NAME=BAAI/bge-reranker-v2-m3
  # CPU image on purpose: reranking a few dozen candidates per query is cheap
  # and this avoids the ROCm/CUDA image matrix. For a GPU box swap the image
  # (:1.5 CUDA / :rocm-1.5) and add the matching device reservation.
  reranker:
    profiles: ["reranker"]
    # cpu-1.5 ships a broken downloader ("relative URL without a base" on a
    # reachable Hub); newer tags fix it. Overridable so a box can try tags
    # without editing this file:  TEI_TAG=cpu-1.7 docker compose ... up reranker
    image: ghcr.io/huggingface/text-embeddings-inference:${TEI_TAG:-cpu-1.7}
    # the ONNX conversion of BAAI/bge-reranker-v2-m3 (same weights): the BAAI
    # repo has no ONNX files, so TEI falls back to its Candle+MKL backend,
    # which crashes on AMD CPUs (endless "Intel MKL ERROR ... SGEMM", TEI
    # issue #636). With onnx/model.onnx present TEI loads the ONNX-Runtime
    # backend instead, which is CPU-vendor-neutral.
    command: ["--model-id",
              "${RERANKER_MODEL_ID:-onnx-community/bge-reranker-v2-m3-ONNX}"]
    environment:
      # explicit hub endpoint: without it, TEI + a set HUGGINGFACE_HUB_CACHE
      # builds an empty base URL and dies with "relative URL without a base".
      # For a restricted/air-gapped box, point this at a reachable mirror
      # (e.g. https://hf-mirror.com) or pre-populate reranker_cache and set
      # HF_HUB_OFFLINE=1.
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
    volumes:
      - reranker_cache:/data

volumes:
  pgdata:
  qdrant_data:
  minio_data:
  reranker_cache:
